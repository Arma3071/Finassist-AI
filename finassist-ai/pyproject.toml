[tool.ruff]
line-length = 110
target-version = "py312"
exclude = ["tests/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["backend"]
omit = ["backend/mcp/server.py", "backend/main.py"]
